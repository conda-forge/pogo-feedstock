schema_version: 1

context:
  name: pogo
  version: 9.10.4

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://gitlab.com/tango-controls/pogo/-/archive/${{ version }}/pogo-${{ version }}.tar.gz
  sha256: 0fd716cd3be81b30b2bc2173b2e1ce1cba8e9f902c8963cc69dd5aa1bab1290b

build:
  number: 1

requirements:
  build:
    - openjdk 17.*
    - maven
    - if: osx
      then: sed
  run:
    - openjdk >=17,<22

tests:
  - script:
      - if: unix
        then: test -f ${PREFIX}/share/java/Pogo.jar
      - if: unix
        then: test -f ${PREFIX}/share/java/Pogo-${PKG_VERSION}.jar
      - if: unix
        then: test -f ${PREFIX}/share/pogo/preferences/Pogo.site_properties
      - if: unix
        then: test -f ${PREFIX}/bin/pogo
      - if: win
        then: if not exist %PREFIX%\share\java\Pogo.jar exit 1
      - if: win
        then: if not exist %PREFIX%\share\pogo\preferences\Pogo.site_properties exit 1
      - if: win
        then: if not exist %PREFIX%\Scripts\pogo.bat exit 1

about:
  license: GPL-3.0-or-later
  license_file:
    - LICENSE
    - aggregate-third-party-report.html
  summary: GUI application for generating Tango projects
  description: |
    Pogo is the TANGO code generator.
    Tango-Controls is a software toolkit for building control systems.
  homepage: https://www.tango-controls.org
  repository: https://gitlab.com/tango-controls/pogo
  documentation: https://tango-controls.readthedocs.io/en/latest/tools-and-extensions/built-in/pogo/index.html

extra:
  recipe-maintainers:
    - beenje
    - dlacoste-esrf
